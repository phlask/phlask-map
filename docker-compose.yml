services:
  app:
    build: .
    stdin_open: true
    ports:
      - '5173:5173'
    entrypoint: bash -c "pnpm install && pnpm start --host"
    volumes:
      - '.:/usr/src/app'
  bash:
    build: .
    ports:
      - '5173:5173'
    stdin_open: true
    entrypoint: /bin/bash
    volumes:
      - '.:/usr/src/app'
  prod_build:
    build: .
    entrypoint: bash -c "(env | grep VITE_ > .env.local || true) && pnpm build"
    environment:
      CI: 'false'
      VITE_DB_URL:
      VITE_DB_API_KEY:
      VITE_SUPABASE_API_KEY:
      VITE_REACT_GOOGLE_MAPS_APIKEY:
      VITE_POSTHOG_KEY:
      VITE_VERIFICATION_PASSWORD:
    volumes:
      - './docker/build:/usr/src/app/build'
      - './docker/testResults:/usr/src/app/testResults'
